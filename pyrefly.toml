# Pyrefly type checker configuration (https://pyrefly.org/en/docs/configuration/).
# Replaces the old Pyre setup (.pyre_configuration): same source roots and
# exclusions, but no watchman daemon and much faster cold checks.

project_includes = [
    "sculptor/**",
]

# Mirrors the old Pyre `exclude` + `ignore_all_errors` lists: build artifacts,
# vendored code, and the test/quarantine trees we intentionally don't typecheck.
project_excludes = [
    "**/_vendor/**",
    "**/build/lib/**",
    "sculptor/frontend/**",
    "sculptor/dist/**",
    "sculptor/tests/**",
    "sculptor/sculptor/testing/**",
    "sculptor/sculptor/quarantine/**",
    "sculptor/agent_docs/**",
]

# Import root: `sculptor/sculptor/...` -> `sculptor.x`.
search_path = [
    "sculptor",
]

python_version = "3.11"

# Colocated unit tests (`*_test.py`) deliberately assert on literal runtime state
# (e.g. `assert agent._is_in_plan_mode is False`). Pyrefly over-narrows such an
# attribute to a literal type after an earlier assignment and then flags the
# assertion as an "always true/false" comparison — a false positive, since it
# cannot see the mutation that happens through the method call under test.
# Disable only that check for test files; it stays active for production code.
[[sub_config]]
matches = "**/*_test.py"
[sub_config.errors]
unnecessary-comparison = false

[no-raw-html-button]
# +13 for the mobile Workspace shell's custom chrome: the agent-switcher pill and
# the full-bleed left-aligned drawer / agent-sheet / changes-pill rows, whose
# pill/row geometry fights Radix Button/IconButton's enforced sizing. The
# icon-only mobile buttons (header, overlays, chat input) DO use Radix IconButton.
# +1 for the Layouts tidy confirmation's "Edit layout to turn off tidying" link: it
# triggers an action, not navigation, so a text-styled <button> is more correct than a
# Radix Link (an <a> without href) and doesn't fit Radix Button's solid/soft chrome.
"." = 38


<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sculptor</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <!-- iOS ignores PWA manifest icons; Add to Home Screen uses this link.
         Opaque on purpose — iOS renders icon transparency as black. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!--
      Import map for runtime-loaded extensions. Each specifier resolves
      to a tiny stub that re-exports from window.__SCULPTOR_HOST__, ensuring
      extensions share the host's singleton instances of React, Jotai, Radix,
      etc. The host populates window.__SCULPTOR_HOST__ during boot, before
      any extension is loaded.

      "@sculptor/plugin-sdk" is the SDK's pre-rename specifier; extensions
      compiled before the rename still import it, so it maps to the same stub
      as "@sculptor/extension-sdk".
    -->
    <script type="importmap">
      {
        "imports": {
          "react": "/extension-runtime/react.js",
          "react/jsx-runtime": "/extension-runtime/react-jsx-runtime.js",
          "react-dom": "/extension-runtime/react-dom.js",
          "react-dom/client": "/extension-runtime/react-dom.js",
          "jotai": "/extension-runtime/jotai.js",
          "@tanstack/react-query": "/extension-runtime/tanstack-react-query.js",
          "@radix-ui/themes": "/extension-runtime/radix-themes.js",
          "lucide-react": "/extension-runtime/lucide-react.js",
          "@sculptor/extension-sdk": "/extension-runtime/sculptor-extension-sdk.js",
          "@sculptor/plugin-sdk": "/extension-runtime/sculptor-extension-sdk.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/Main.tsx"></script>
  </body>
</html>

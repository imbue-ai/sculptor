<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sculptor guy, normal proportions: the logo is the bust (head + chest), with
  a pelvis section and thick two-segment limbs scaled to match it. Joints are
  marked with darker ball-joint discs, artist's-mannequin style - fitting,
  since he's a sculpture.

  Same rig conventions as sculptor-guy.svg: every posable joint is a
  <g data-joint="..."> whose pivot is placed by a wrapper translate, so posing
  is just a rotate() on the group. See that file for the full conventions
  (z-order, near/far coloring, rotation sign).

  Joints (pivot points in the 320x400 viewBox):
    body    - bust + face + arms; lean/bob/squash about the waist (160, 205)
    armL    - left shoulder   (92, 130)      elbowL - 52 below the shoulder
    armR    - right shoulder  (228, 132)     elbowR - 52 below the shoulder
    thighL  - left hip        (138, 238)     calfL  - knee, 58 below the hip
    thighR  - right hip       (182, 238)     calfR  - knee, 58 below the hip
    footL/R - ankles, 50 below each knee
    pupils  - translate-only, for look direction

  The pelvis is root-level geometry (not a joint): the torso leans over it and
  the legs hang from it, so it stays put with the legs. The bust overlaps its
  top edge by ~17 units so torso lean never opens a gap. Feet rest at y=359.5.
-->
<svg width="320" height="400" viewBox="0 0 320 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Sculptor guy (normal proportions)</title>
  <style>
    .limb { stroke-linecap: round; fill: none; }
    .near { stroke: #F50D00; }
    .far  { stroke: #C90B00; }
    .joint-near { fill: #AD0900; }
    .joint-far  { fill: #8F0700; }
    .face { animation: blink 4.6s infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes blink {
      0%, 95%, 100% { transform: scaleY(1); }
      97% { transform: scaleY(0.08); }
    }
  </style>

  <!-- far (right) leg: behind the pelvis -->
  <g transform="translate(182,238)">
    <g data-joint="thighR" transform="rotate(-3)">
      <path class="limb far" stroke-width="26" d="M0 2L0 58"/>
      <circle fill="#A50800" r="13"/>
      <g transform="translate(0,58)">
        <g data-joint="calfR">
          <path class="limb far" stroke-width="21" d="M0 0L0 50"/>
          <circle class="joint-far" r="10"/>
          <g transform="translate(0,50)">
            <g data-joint="footR">
              <path class="limb far" stroke-width="17" d="M-3 5L21 5"/>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- pelvis -->
  <rect x="122" y="196" width="76" height="48" rx="22" fill="#F50D00"/>

  <!-- body: bust (the logo), face, and both arms -->
  <g data-joint="body">
    <!-- far (right) arm: behind the bust -->
    <g transform="translate(228,132)">
      <g data-joint="armR" transform="rotate(-10)">
        <path class="limb far" stroke-width="21" d="M0 2L0 52"/>
        <circle fill="#A50800" r="12"/>
        <g transform="translate(0,52)">
          <g data-joint="elbowR" transform="rotate(-6)">
            <path class="limb far" stroke-width="18" d="M0 0L0 46"/>
            <circle class="joint-far" r="9"/>
          </g>
        </g>
      </g>
    </g>

    <!-- bust: the original Sculptor logo path, untouched -->
    <g transform="translate(82,10)">
      <path d="M103.454 3.61361C121.524 12.5312 120.94 41.6833 117.978 52.6868C115.015 63.6904 107.821 70.0386 100.906 75.388C97.9926 106.013 134.582 64.3285 148.548 84.6428C162.514 104.957 153.627 133.736 144.739 135.005C128.703 137.296 125.232 138.624 117.845 148.001C110.459 157.379 120.69 173.484 113.322 184.73C102.996 200.492 20.5874 208.896 19.344 187.446C18.9618 180.851 19.465 174.645 22.2676 168.655C23.315 166.417 26.9455 158.371 23.1397 157.379C16.7512 155.714 0.917805 158.702 0.229106 148.748C-0.811812 133.703 1.18263 109.089 17.0262 101.84C27.9341 96.849 53.1464 99.2114 60.3123 90.9717C62.586 88.3571 62.6406 85.3365 63.0102 82.1206C59.8859 80.1425 57.3346 77.4172 54.7865 74.7714C46.0239 65.6729 45.514 50.5068 46.8776 39.144C49.4168 17.9833 55.7701 8.83934 71.3307 2.64402C80.8742 -1.1556 94.3401 -0.883824 103.454 3.61361Z" fill="#F50D00"/>
    </g>

    <!-- face -->
    <g class="face">
      <ellipse cx="154" cy="50" rx="7.5" ry="8.5" fill="#FFFFFF"/>
      <ellipse cx="180" cy="46" rx="7.5" ry="8.5" fill="#FFFFFF"/>
      <g data-joint="pupils">
        <circle cx="154" cy="52" r="3.4" fill="#1F1F1F"/>
        <circle cx="180" cy="48" r="3.4" fill="#1F1F1F"/>
      </g>
    </g>

    <!-- near (left) arm: in front -->
    <g transform="translate(92,130)">
      <g data-joint="armL" transform="rotate(10)">
        <path class="limb near" stroke-width="21" d="M0 2L0 52"/>
        <circle fill="#DD0C00" r="12"/>
        <g transform="translate(0,52)">
          <g data-joint="elbowL" transform="rotate(6)">
            <path class="limb near" stroke-width="18" d="M0 0L0 46"/>
            <circle class="joint-near" r="9"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- near (left) leg: in front of the pelvis -->
  <g transform="translate(138,238)">
    <g data-joint="thighL" transform="rotate(3)">
      <path class="limb near" stroke-width="26" d="M0 2L0 58"/>
      <circle fill="#DD0C00" r="13"/>
      <g transform="translate(0,58)">
        <g data-joint="calfL">
          <path class="limb near" stroke-width="21" d="M0 0L0 50"/>
          <circle class="joint-near" r="10"/>
          <g transform="translate(0,50)">
            <g data-joint="footL">
              <path class="limb near" stroke-width="17" d="M3 5L-21 5"/>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>

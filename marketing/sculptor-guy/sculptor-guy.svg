<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sculptor guy: the Sculptor logo blob, rigged with arms and legs.

  Rig overview
  ============
  The character is a hierarchy of groups. Every posable joint is a <g> tagged
  with a data-joint attribute; posing it means setting a `transform` on that
  group (rotate for limbs, an arbitrary transform for the body).

  Each joint group sits inside a positioning wrapper like
  <g transform="translate(x,y)"> that places the pivot, so the joint's own
  rotation is always about its local (0,0). Limb geometry is drawn pointing
  straight down (+y) from the pivot.

  Joints (pivot points in the 260x310 viewBox):
    body    - torso + face; lean/bob/squash about the hip center (122, 197)
    armL    - left shoulder   (62, 146)      elbowL - 28 below the shoulder
    armR    - right shoulder  (176, 150)     elbowR - 28 below the shoulder
    thighL  - left hip        (104, 198)     calfL  - knee, 38 below the hip
    thighR  - right hip       (140, 198)     calfR  - knee, 38 below the hip
    footL/R - ankles, 32 below each knee
    pupils  - translate-only, for look direction

  Rotation sign: SVG rotate() is clockwise, so on a downward-pointing limb a
  positive angle swings the tip toward -x (screen left).

  Conventions worth keeping:
  - Limbs are stroked paths with round linecaps ("noodle limbs"). Near-side
    limbs (left) share the body fill (#F50D00) so overlaps at the shoulder and
    hip are seamless; far-side limbs (right) are darker (#C90B00) and drawn
    BEHIND the body so only the exposed part shows. Preserve that z-order:
    far limbs, body, near limbs.
  - The arms are parented inside the body group so torso lean and squash carry
    them along. The legs are parented at the root so they stay planted.
  - The original logo path is untouched; it is only wrapped in a
    translate(52,10) group. Feet rest at y=278.5 in viewBox units.
-->
<svg width="260" height="310" viewBox="0 0 260 310" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Sculptor guy</title>
  <style>
    .limb { stroke-linecap: round; fill: none; }
    .near { stroke: #F50D00; }
    .far  { stroke: #C90B00; }
    .face { animation: blink 4.6s infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes blink {
      0%, 95%, 100% { transform: scaleY(1); }
      97% { transform: scaleY(0.08); }
    }
  </style>

  <!-- far (right) leg: behind the body -->
  <g transform="translate(140,198)">
    <g data-joint="thighR" transform="rotate(-4)">
      <path class="limb far" stroke-width="17" d="M0 4L0 38"/>
      <g transform="translate(0,38)">
        <g data-joint="calfR">
          <path class="limb far" stroke-width="15" d="M0 0L0 32"/>
          <g transform="translate(0,32)">
            <g data-joint="footR">
              <path class="limb far" stroke-width="13" d="M-3 4L13 4"/>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- body: torso (the logo), face, and both arms -->
  <g data-joint="body">
    <!-- far (right) arm: behind the torso -->
    <g transform="translate(176,150)">
      <g data-joint="armR" transform="rotate(-18)">
        <path class="limb far" stroke-width="13" d="M0 2L0 28"/>
        <g transform="translate(0,28)">
          <g data-joint="elbowR" transform="rotate(-6)">
            <path class="limb far" stroke-width="12" d="M0 0L0 26"/>
          </g>
        </g>
      </g>
    </g>

    <!-- torso: the original Sculptor logo path, untouched -->
    <g transform="translate(52,10)">
      <path d="M103.454 3.61361C121.524 12.5312 120.94 41.6833 117.978 52.6868C115.015 63.6904 107.821 70.0386 100.906 75.388C97.9926 106.013 134.582 64.3285 148.548 84.6428C162.514 104.957 153.627 133.736 144.739 135.005C128.703 137.296 125.232 138.624 117.845 148.001C110.459 157.379 120.69 173.484 113.322 184.73C102.996 200.492 20.5874 208.896 19.344 187.446C18.9618 180.851 19.465 174.645 22.2676 168.655C23.315 166.417 26.9455 158.371 23.1397 157.379C16.7512 155.714 0.917805 158.702 0.229106 148.748C-0.811812 133.703 1.18263 109.089 17.0262 101.84C27.9341 96.849 53.1464 99.2114 60.3123 90.9717C62.586 88.3571 62.6406 85.3365 63.0102 82.1206C59.8859 80.1425 57.3346 77.4172 54.7865 74.7714C46.0239 65.6729 45.514 50.5068 46.8776 39.144C49.4168 17.9833 55.7701 8.83934 71.3307 2.64402C80.8742 -1.1556 94.3401 -0.883824 103.454 3.61361Z" fill="#F50D00"/>
    </g>

    <!-- face -->
    <g class="face">
      <ellipse cx="124" cy="50" rx="7.5" ry="8.5" fill="#FFFFFF"/>
      <ellipse cx="150" cy="46" rx="7.5" ry="8.5" fill="#FFFFFF"/>
      <g data-joint="pupils">
        <circle cx="124" cy="52" r="3.4" fill="#1F1F1F"/>
        <circle cx="150" cy="48" r="3.4" fill="#1F1F1F"/>
      </g>
    </g>

    <!-- near (left) arm: in front, same red as the torso so the seam vanishes -->
    <g transform="translate(62,146)">
      <g data-joint="armL" transform="rotate(18)">
        <path class="limb near" stroke-width="13" d="M0 2L0 28"/>
        <g transform="translate(0,28)">
          <g data-joint="elbowL" transform="rotate(6)">
            <path class="limb near" stroke-width="12" d="M0 0L0 26"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- near (left) leg: in front, same red as the torso -->
  <g transform="translate(104,198)">
    <g data-joint="thighL" transform="rotate(4)">
      <path class="limb near" stroke-width="17" d="M0 4L0 38"/>
      <g transform="translate(0,38)">
        <g data-joint="calfL">
          <path class="limb near" stroke-width="15" d="M0 0L0 32"/>
          <g transform="translate(0,32)">
            <g data-joint="footL">
              <path class="limb near" stroke-width="13" d="M3 4L-13 4"/>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>

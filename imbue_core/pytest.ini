[pytest]
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:wandb.*:
    ignore::DeprecationWarning:graphql.*:
    ignore::DeprecationWarning:notebook.*:
    ignore::DeprecationWarning:nptyping.*:
markers =
    integration_test: <10 seconds test that can use any resource
    slow_integration_test: like integration tests but can take up to 100 seconds
    needs_claude_code: needs the Claude Code CLI to be installed
addopts =
    --ignore=quarantine
    --ignore-glob=**/quarantine/**
    --ignore-glob=**/notebooks/**
    --snapshot-ignore-file-extensions=llm_cache_json,count_tokens_cache_json,project_state_json,transport_cache_jsonl
